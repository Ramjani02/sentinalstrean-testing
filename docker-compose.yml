version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelstream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ──────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: sentinel_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sentinel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit_secret}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── FastAPI Application ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sentinel_api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_secret}@db:5432/${POSTGRES_DB:-sentinelstream}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-sentinel}:${RABBITMQ_PASSWORD:-rabbit_secret}@rabbitmq:5672//
    volumes:
      - ./app:/app/app
      - ./ml_models:/app/ml_models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ─────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sentinel_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_secret}@db:5432/${POSTGRES_DB:-sentinelstream}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-sentinel}:${RABBITMQ_PASSWORD:-rabbit_secret}@rabbitmq:5672//
    volumes:
      - ./app:/app/app
      - ./ml_models:/app/ml_models
    depends_on:
      - api
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  # ─── Celery Beat (Scheduler) ────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sentinel_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_secret}@db:5432/${POSTGRES_DB:-sentinelstream}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-sentinel}:${RABBITMQ_PASSWORD:-rabbit_secret}@rabbitmq:5672//
    volumes:
      - ./app:/app/app
    depends_on:
      - celery_worker
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sentinel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
