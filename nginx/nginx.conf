# SentinelStream - Nginx Reverse Proxy Configuration
# Handles: SSL termination, rate limiting, compression, load balancing

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Rate Limiting Zones ────────────────────────────────────
    # 10MB shared memory zone, limit each IP to 100 req/sec
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # Stricter limit for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:5m rate=10r/s;

    # ── Upstream ───────────────────────────────────────────────
    upstream sentinelstream_api {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost sentinelstream.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security Headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # API Documentation (no rate limit)
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://sentinelstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health Check (no rate limit)
        location /health {
            proxy_pass http://sentinelstream_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # Auth endpoints - strict rate limit
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://sentinelstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Transaction endpoints - high throughput
        location /api/v1/transactions {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://sentinelstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Critical: low timeout to enforce <200ms SLA
            proxy_read_timeout 5s;
            proxy_connect_timeout 2s;
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://sentinelstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
        }
    }
}
